name: Build & Release

# Builds the release Android APK + the Flutter web bundle and publishes both to
# GitHub Releases.
#  • Push a tag like v1.0.0           → release named after the tag
#  • Run manually (Actions ▸ Run)     → release "build-<run number>" (or a tag you type)
# Both artifacts are also uploaded as build artifacts on every run.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (optional, e.g. v1.0.0). Leave blank for build-<run>.'
        required: false
        default: ''

permissions:
  contents: write # required to create the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pinned to the SDK this project was built with (Dart 3.12.2 → pubspec sdk ^3.12.2).
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Build web bundle
        run: flutter build web --release

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="build-${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Stage APK + web bundle
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/kudimata-securities-${TAG}.apk"
          ( cd build/web && zip -qr "../../dist/kudimata-securities-web-${TAG}.zip" . )

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kudimata-securities-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: kudimata-securities-web
          path: build/web
          if-no-files-found: error

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Kudimata Securities ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.zip
          body: |
            Builds for Kudimata Securities.

            - **`*.apk`** — Android release APK. Signed with Android debug keys (no production
              keystore configured), so it's for testing/sideloading — not Play Store upload.
              Enable "install from unknown sources" on the device to sideload.
            - **`*-web.zip`** — static Flutter web build. Unzip and serve over HTTP (e.g.
              `python3 -m http.server`); it needs a web server, opening `index.html` from disk
              won't work. To host on GitHub Pages at a sub-path, rebuild with
              `flutter build web --base-href /Kudimata-Securities-Mobile/`.
